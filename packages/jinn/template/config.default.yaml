jinn:
  version: "0.3.0"

gateway:
  port: 7777
  host: "127.0.0.1"

engines:
  default: claude
  claude:
    bin: claude
    model: opus
    effortLevel: medium
  codex:
    bin: codex
    model: gpt-5.4
    effortLevel: high

# Model + capability registry — single source of truth for the UI selectors.
# Add a new model here (id + label + capability flags); no code change needed.
# effortLevels gate the effort picker (empty = no effort support for that model).
# Omit this whole block and the registry is synthesized from engines.<name>.model.
models:
  claude:
    default: opus
    effortMechanism: claude-flag
    models:
      - { id: opus, label: "Opus 4.8", supportsEffort: true, effortLevels: [low, medium, high], contextWindow: 1000000 }
      - { id: claude-sonnet-4-6, label: "Sonnet 4.6", supportsEffort: true, effortLevels: [low, medium, high], contextWindow: 200000 }
      - { id: claude-haiku-4-5, label: "Haiku 4.5", supportsEffort: true, effortLevels: [low, medium, high], contextWindow: 200000 }
  codex:
    default: gpt-5.4
    effortMechanism: codex-config
    models:
      - { id: gpt-5.4, label: "GPT-5.4 Codex", supportsEffort: true, effortLevels: [low, medium, high, xhigh] }
  antigravity:
    default: gemini-3-flash-preview
    effortMechanism: none
    models:
      - { id: gemini-3-flash-preview, label: "Gemini 3 Flash", supportsEffort: false, effortLevels: [] }
      - { id: gemini-3-pro-preview, label: "Gemini 3 Pro", supportsEffort: false, effortLevels: [] }

connectors:
  slack:
    shareSessionInChannel: false
    ignoreOldMessagesOnBoot: true

# MCP servers provide employees with browser, search, and messaging capabilities.
# These are injected automatically into Claude Code sessions via --mcp-config.
mcp:
  browser:
    enabled: true
    provider: playwright   # or "puppeteer"
  search:
    enabled: false         # Set to true and add apiKey or set BRAVE_API_KEY env var
    provider: brave
    # apiKey: ${BRAVE_API_KEY}
  fetch:
    enabled: true
  gateway:
    enabled: true          # Built-in MCP server for messaging, org, cron, sessions
  # custom:
  #   my-server:
  #     enabled: true
  #     command: npx
  #     args: ["-y", "@my/mcp-server"]
  #     env:
  #       API_KEY: ${MY_API_KEY}

# Session limits (can be overridden per-employee in their YAML)
sessions:
  maxDurationMinutes: 30
  maxCostUsd: 10.00

# Cron configuration
cron:
  # alertConnector: slack
  # alertChannel: "#alerts"

portal:
  language: English

logging:
  file: true
  stdout: true
  level: info
