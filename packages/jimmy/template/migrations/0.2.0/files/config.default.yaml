jinn:
  version: "0.2.0"

gateway:
  port: 7777
  host: "127.0.0.1"

engines:
  default: claude
  claude:
    bin: claude
    model: opus
    effortLevel: medium
  codex:
    bin: codex
    model: gpt-5.4
    effortLevel: high

connectors:
  slack:
    shareSessionInChannel: false
    ignoreOldMessagesOnBoot: true

portal:
  language: English

logging:
  file: true
  stdout: true
  level: info
